encoding: utf-8

# SEO相关信息
title: yihuier Blog
description: yihiuer的个人博客
keywords: Yihuier,Blog,Java,Html,JavaScript
author: Yihuier
footerText: Copyright © 2021 闽ICP备2020023190号

# 这些不要动
permalink: /posts/:year/:month/:day/:title.html
kramdown:
  auto_ids: true
  input: GFM
  syntax_highlighter: rouge
exclude: ['CNAME', 'README.md', 'LICENSE', '_site', 'dist', 'Gemfile', 'Gemfile.lock', 'blog.sh']

# 域名配置
# baseurl配置,如果网站部署在根目录下的其他目录中，请设置为 /目录名
domainUrl: 'https://blog.yihuier.top'
baseurl: ''

# 吐个槽地址，会在chat页面中重定向到该地址
# tucaoUrl: https://support.qq.com/product/86335

# 菜单
menu:
  - title: 首页
    url: /
  - title: 归类
    url: /pages/categories.html
  - title: 搜索
    url: /pages/search.html
  # - title: 友链
  #   url: /pages/links.html
  # - title: 留言
  #   url: /pages/chat.html
  # - title: 关于
  #   url: /pages/about.html

# 点击页面文字冒出特效,不需要请设置为false
extClickEffect: false

# Google Adsense,不需要请设置为false
# _includes/ext-adsense.html 里面修改为自己的配置
extAdsense: false

# 数学公式支持，比较影响加载速度,不需要请设置为false
extMath: false

# 友情链接
links:
  - title: ''
    url: ''

